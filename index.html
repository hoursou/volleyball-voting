<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Tool - Network Utility</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .ping-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
        
        .result-item {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .success { color: #10b981; }
        .warning { color: #f59e0b; }
        .error { color: #ef4444; }
        
        .chart-bar {
            transition: all 0.3s ease;
        }
        
        .chart-bar:hover {
            transform: scaleY(1.1);
            filter: brightness(1.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="container max-w-6xl mx-auto">
        <div class="glass-morphism p-8 shadow-2xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white mb-2">
                    <i class="fas fa-network-wired mr-3"></i>Ping Tool
                </h1>
                <p class="text-gray-200">Test network connectivity and latency</p>
            </div>
            
            <!-- Input Section -->
            <div class="mb-8">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1">
                        <input 
                            type="text" 
                            id="targetInput" 
                            placeholder="Enter hostname or IP address (e.g., google.com, 8.8.8.8)"
                            class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent"
                        >
                    </div>
                    <div class="flex gap-2">
                        <button 
                            id="pingBtn"
                            class="px-6 py-3 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-400"
                        >
                            <i class="fas fa-play mr-2"></i>Start Ping
                        </button>
                        <button 
                            id="stopBtn"
                            class="px-6 py-3 bg-red-500 hover:bg-red-600 text-white rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-400 hidden"
                        >
                            <i class="fas fa-stop mr-2"></i>Stop
                        </button>
                        <button 
                            id="clearBtn"
                            class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-gray-400"
                        >
                            <i class="fas fa-trash mr-2"></i>Clear
                        </button>
                    </div>
                </div>
                
                <!-- Settings -->
                <div class="mt-4 flex flex-wrap gap-4">
                    <div class="flex items-center gap-2">
                        <label class="text-white text-sm">Count:</label>
                        <input 
                            type="number" 
                            id="countInput" 
                            value="4" 
                            min="1" 
                            max="100"
                            class="w-20 px-2 py-1 rounded bg-white/20 border border-white/30 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-white/50"
                        >
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-white text-sm">Interval (ms):</label>
                        <input 
                            type="number" 
                            id="intervalInput" 
                            value="1000" 
                            min="100" 
                            max="10000"
                            step="100"
                            class="w-24 px-2 py-1 rounded bg-white/20 border border-white/30 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-white/50"
                        >
                    </div>
                    <div class="flex items-center gap-2">
                        <input 
                            type="checkbox" 
                            id="continuousCheckbox"
                            class="rounded"
                        >
                        <label for="continuousCheckbox" class="text-white text-sm">Continuous</label>
                    </div>
                </div>
            </div>
            
            <!-- Status Section -->
            <div class="mb-6 glass-morphism p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div id="statusIcon" class="text-2xl">
                            <i class="fas fa-circle text-gray-400"></i>
                        </div>
                        <div>
                            <div class="text-white font-semibold">Status</div>
                            <div id="statusText" class="text-gray-300 text-sm">Ready to ping</div>
                        </div>
                    </div>
                    <div id="pingCount" class="text-white text-sm">
                        Pings: 0
                    </div>
                </div>
            </div>
            
            <!-- Statistics -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="glass-morphism p-4 text-center">
                    <div class="text-gray-300 text-sm mb-1">Sent</div>
                    <div id="statsSent" class="text-white text-2xl font-bold">0</div>
                </div>
                <div class="glass-morphism p-4 text-center">
                    <div class="text-gray-300 text-sm mb-1">Received</div>
                    <div id="statsReceived" class="text-white text-2xl font-bold">0</div>
                </div>
                <div class="glass-morphism p-4 text-center">
                    <div class="text-gray-300 text-sm mb-1">Lost</div>
                    <div id="statsLost" class="text-white text-2xl font-bold">0%</div>
                </div>
                <div class="glass-morphism p-4 text-center">
                    <div class="text-gray-300 text-sm mb-1">Avg Time</div>
                    <div id="statsAvg" class="text-white text-2xl font-bold">-</div>
                </div>
            </div>
            
            <!-- Results Section -->
            <div class="glass-morphism p-4 max-h-96 overflow-y-auto">
                <h3 class="text-white font-semibold mb-3">
                    <i class="fas fa-list mr-2"></i>Ping Results
                </h3>
                <div id="resultsContainer" class="space-y-2">
                    <div class="text-gray-300 text-center py-8">
                        <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                        <p>No ping results yet</p>
                    </div>
                </div>
            </div>
            
            <!-- Latency Chart -->
            <div class="mt-6 glass-morphism p-4">
                <h3 class="text-white font-semibold mb-3">
                    <i class="fas fa-chart-line mr-2"></i>Latency Chart
                </h3>
                <div id="chartContainer" class="h-32 flex items-end justify-center gap-1">
                    <div class="text-gray-300 text-sm">No data to display</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
