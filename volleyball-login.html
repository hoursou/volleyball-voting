<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .tab-button {
            transition: all 0.3s ease;
        }
        
        .tab-button:hover {
            transform: translateY(-2px);
        }
        
        .tab-button.active {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }
        
        .feature-card {
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo and Title -->
        <div class="text-center mb-8 fade-in">
            <i class="fas fa-volleyball-ball text-6xl text-white mb-4"></i>
            <h1 class="text-3xl font-bold text-white mb-2">Volleyball Voting</h1>
            <p class="text-gray-200">WhatsApp Group Session Management</p>
        </div>
        
        <!-- Login Card -->
        <div class="login-card p-8 mb-6 fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </h2>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                    <input 
                        type="text" 
                        id="userName" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your name"
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Access Code</label>
                    <input 
                        type="password" 
                        id="accessCode" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter access code"
                    >
                </div>
                
                <button type="submit" class="w-full btn-primary text-white py-3 rounded-lg font-semibold">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login to Voting
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <p class="text-sm text-gray-600">
                    Don't have access? 
                    <button onclick="showRequestAccess()" class="text-blue-600 hover:text-blue-800 font-medium">
                        Request Access
                    </button>
                </p>
            </div>
        </div>
        
        <!-- Access Options -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
            <div class="feature-card bg-white/90 backdrop-blur p-6 rounded-lg">
                <div class="text-center mb-4">
                    <i class="fas fa-users text-3xl text-blue-600"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">Regular User</h3>
                <p class="text-gray-600 text-sm mb-4">Join sessions, vote, and manage your participation</p>
                <button onclick="selectUserType('user')" class="w-full bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-medium tab-button">
                    <i class="fas fa-user mr-2"></i>Continue as Guest
                </button>
            </div>
            
            <div class="feature-card bg-white/90 backdrop-blur p-6 rounded-lg">
                <div class="text-center mb-4">
                    <i class="fas fa-user-shield text-3xl text-green-600"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">Session Creator</h3>
                <p class="text-gray-600 text-sm mb-4">Create and manage volleyball sessions</p>
                <button onclick="showAdminLogin()" class="w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-medium tab-button">
                    <i class="fas fa-shield-alt mr-2"></i>Admin Login
                </button>
            </div>
        </div>
        
        <!-- Quick Access Codes -->
        <div class="mt-8 text-center fade-in">
            <div class="bg-white/20 backdrop-blur p-4 rounded-lg inline-block">
                <p class="text-white text-sm mb-2">Quick Access Codes:</p>
                <div class="flex flex-wrap gap-2 justify-center">
                    <code class="bg-white/30 px-2 py-1 rounded text-xs">volleyball2024</code>
                    <code class="bg-white/30 px-2 py-1 rounded text-xs">moderator2024</code>
                    <code class="bg-white/30 px-2 py-1 rounded text-xs">admin123</code>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Request Access Modal -->
    <div id="requestAccessModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-4">
                <i class="fas fa-envelope mr-2"></i>Request Access
            </h3>
            
            <form id="requestForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                    <input 
                        type="text" 
                        id="requestName" 
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your name"
                    >
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">WhatsApp Number</label>
                    <input 
                        type="tel" 
                        id="requestPhone" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="+1234567890"
                    >
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Reason for Access</label>
                    <select 
                        id="requestReason" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                        <option value="">Select reason...</option>
                        <option value="player">I want to join volleyball sessions</option>
                        <option value="creator">I want to create volleyball sessions</option>
                        <option value="moderator">I want to help manage the group</option>
                    </select>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Message (Optional)</label>
                    <textarea 
                        id="requestMessage" 
                        rows="3"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Additional information..."
                    ></textarea>
                </div>
                
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-medium">
                        <i class="fas fa-paper-plane mr-2"></i>Send Request
                    </button>
                    <button type="button" onclick="hideRequestAccess()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-medium">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="volleyball-login.js"></script>
</body>
</html>
