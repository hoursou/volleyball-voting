<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Volleyball Login - Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .mobile-container {
            max-width: 100%;
            padding: 1rem;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            overflow: hidden;
        }
        
        .mobile-btn {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px; /* iOS touch target */
            min-width: 44px;
        }
        
        .mobile-btn:active {
            transform: scale(0.95);
        }
        
        .mobile-btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }
        
        .mobile-btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .mobile-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            min-height: 44px;
        }
        
        .mobile-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .feature-card:active {
            transform: scale(0.98);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Logo and Title -->
        <div class="text-center mb-6 fade-in">
            <i class="fas fa-volleyball-ball text-5xl text-white mb-3"></i>
            <h1 class="text-2xl font-bold text-white mb-1">Volleyball Voting</h1>
            <p class="text-gray-200 text-sm">Mobile Login</p>
        </div>
        
        <!-- Login Card -->
        <div class="login-card fade-in">
            <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </h2>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                    <input 
                        type="text" 
                        id="userName" 
                        required
                        class="mobile-input"
                        placeholder="Enter your name"
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Access Code</label>
                    <input 
                        type="password" 
                        id="accessCode" 
                        required
                        class="mobile-input"
                        placeholder="Enter access code"
                    >
                </div>
                
                <button type="submit" class="w-full mobile-btn mobile-btn-primary">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <p class="text-sm text-gray-600">
                    Need access? 
                    <button onclick="showRequestAccess()" class="text-blue-600 font-medium">
                        Request Access
                    </button>
                </p>
            </div>
        </div>
        
        <!-- Access Options -->
        <div class="grid grid-cols-1 gap-4 fade-in">
            <div class="feature-card">
                <i class="fas fa-user text-3xl text-blue-600 mb-3"></i>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">Guest Access</h3>
                <p class="text-gray-600 text-sm mb-4">View and join sessions</p>
                <button onclick="continueAsGuest()" class="w-full mobile-btn mobile-btn-secondary">
                    <i class="fas fa-user mr-2"></i>Continue as Guest
                </button>
            </div>
            
            <div class="feature-card">
                <i class="fas fa-user-shield text-3xl text-green-600 mb-3"></i>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">Admin Access</h3>
                <p class="text-gray-600 text-sm mb-4">Create and manage sessions</p>
                <button onclick="showAdminLogin()" class="w-full mobile-btn mobile-btn-primary">
                    <i class="fas fa-shield-alt mr-2"></i>Admin Login
                </button>
            </div>
        </div>
        
        <!-- Quick Access Codes -->
        <div class="mt-6 text-center fade-in">
            <div class="bg-white/20 backdrop-blur p-3 rounded-lg inline-block">
                <p class="text-white text-xs mb-2">Quick Access:</p>
                <div class="flex flex-wrap gap-2 justify-center">
                    <code class="bg-white/30 px-2 py-1 rounded text-xs">volleyball2024</code>
                    <code class="bg-white/30 px-2 py-1 rounded text-xs">moderator2024</code>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Request Access Modal -->
    <div id="requestAccessModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">
                <i class="fas fa-envelope mr-2"></i>Request Access
            </h3>
            
            <form id="requestForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Your Name</label>
                    <input 
                        type="text" 
                        id="requestName" 
                        required
                        class="mobile-input"
                        placeholder="Enter your name"
                    >
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">WhatsApp Number</label>
                    <input 
                        type="tel" 
                        id="requestPhone" 
                        class="mobile-input"
                        placeholder="+1234567890"
                    >
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Reason</label>
                    <select 
                        id="requestReason" 
                        class="mobile-input"
                    >
                        <option value="">Select reason...</option>
                        <option value="player">I want to join sessions</option>
                        <option value="creator">I want to create sessions</option>
                        <option value="moderator">I want to help manage</option>
                    </select>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Message</label>
                    <textarea 
                        id="requestMessage" 
                        rows="3"
                        class="mobile-input"
                        placeholder="Additional information..."
                    ></textarea>
                </div>
                
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 mobile-btn mobile-btn-primary">
                        <i class="fas fa-paper-plane mr-2"></i>Send
                    </button>
                    <button type="button" onclick="hideRequestAccess()" class="flex-1 mobile-btn mobile-btn-secondary">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="volleyball-mobile-login.js"></script>
</body>
</html>
