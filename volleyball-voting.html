<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Session Voting</title>
    <link rel="stylesheet" href="tailwind.min.css">
    <link rel="stylesheet" href="font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .session-card {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        
        .session-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .session-card.active {
            border-left-color: #10b981;
        }
        
        .session-card.full {
            border-left-color: #ef4444;
        }
        
        .session-card.upcoming {
            border-left-color: #3b82f6;
        }
        
        .player-badge {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .waiting-list-item {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        .countdown {
            font-variant-numeric: tabular-nums;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="container max-w-7xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-volleyball-ball mr-3"></i>Volleyball Session Voting
            </h1>
            <p class="text-gray-200">WhatsApp Group: Volleyball</p>
        </div>
        
        <!-- Admin Section -->
        <div class="glass-morphism p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold text-white">
                    <i class="fas fa-cog mr-2"></i>Admin Panel
                </h2>
                <button id="createSessionBtn" class="btn-primary px-6 py-3 text-white rounded-lg font-semibold">
                    <i class="fas fa-plus mr-2"></i>Create New Session
                </button>
            </div>
        </div>
        
        <!-- Sessions Grid -->
        <div id="sessionsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Sessions will be dynamically added here -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="glass-morphism p-12 text-center">
            <i class="fas fa-calendar-times text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-2xl font-bold text-white mb-2">No Sessions Yet</h3>
            <p class="text-gray-300 mb-6">Create your first volleyball session to get started!</p>
            <button onclick="document.getElementById('createSessionBtn').click()" class="btn-primary px-6 py-3 text-white rounded-lg font-semibold">
                <i class="fas fa-plus mr-2"></i>Create Session
            </button>
        </div>
    </div>
    
    <!-- Create Session Modal -->
    <div id="createSessionModal" class="modal">
        <div class="modal-content glass-morphism p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold text-white mb-6">
                <i class="fas fa-plus-circle mr-2"></i>Create New Session
            </h3>
            
            <form id="createSessionForm">
                <div class="mb-4">
                    <label class="block text-white text-sm font-medium mb-2">Session Number</label>
                    <input 
                        type="number" 
                        id="sessionNumber" 
                        required
                        class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white/50"
                        placeholder="e.g., 1, 2, 3..."
                    >
                </div>
                
                <div class="mb-4">
                    <label class="block text-white text-sm font-medium mb-2">Date & Time</label>
                    <input 
                        type="datetime-local" 
                        id="sessionDateTime" 
                        required
                        class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white/50"
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-white text-sm font-medium mb-2">Maximum Players</label>
                    <input 
                        type="number" 
                        id="maxPlayers" 
                        min="2" 
                        max="20" 
                        value="12"
                        required
                        class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white/50"
                    >
                </div>
                
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 btn-success px-6 py-3 text-white rounded-lg font-semibold">
                        <i class="fas fa-check mr-2"></i>Create Session
                    </button>
                    <button type="button" onclick="closeModal('createSessionModal')" class="flex-1 bg-gray-500 hover:bg-gray-600 px-6 py-3 text-white rounded-lg font-semibold transition">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Join Session Modal -->
    <div id="joinSessionModal" class="modal">
        <div class="modal-content glass-morphism p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold text-white mb-6">
                <i class="fas fa-user-plus mr-2"></i>Join Session
            </h3>
            
            <form id="joinSessionForm">
                <div class="mb-4">
                    <label class="block text-white text-sm font-medium mb-2">Your Name</label>
                    <input 
                        type="text" 
                        id="playerName" 
                        required
                        class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white/50"
                        placeholder="Enter your name"
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-white text-sm font-medium mb-2">WhatsApp Number (Optional)</label>
                    <input 
                        type="tel" 
                        id="playerPhone" 
                        class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white/50"
                        placeholder="+1234567890"
                    >
                </div>
                
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 btn-success px-6 py-3 text-white rounded-lg font-semibold">
                        <i class="fas fa-check mr-2"></i>Join Session
                    </button>
                    <button type="button" onclick="closeModal('joinSessionModal')" class="flex-1 bg-gray-500 hover:bg-gray-600 px-6 py-3 text-white rounded-lg font-semibold transition">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="volleyball-voting.js"></script>
</body>
</html>
